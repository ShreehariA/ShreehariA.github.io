<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Lost in space</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23060913'/%3E%3Ccircle cx='32' cy='30' r='11' fill='%2367e8f9'/%3E%3Cellipse cx='32' cy='33' rx='22' ry='6.5' fill='none' stroke='%23ffc46b' stroke-width='3'/%3E%3C/svg%3E">
<style>
:root{--void:#060913;--ion:#67e8f9;--amber:#ffc46b;--muted:#93a3bf;--line:rgba(125,175,255,.2)}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100svh;display:flex;align-items:center;justify-content:center;text-align:center;
  background:
    radial-gradient(1.5px 1.5px at 12% 22%, rgba(220,240,255,.9), transparent 60%),
    radial-gradient(1px 1px at 78% 14%, rgba(220,240,255,.7), transparent 60%),
    radial-gradient(1.5px 1.5px at 62% 68%, rgba(220,240,255,.8), transparent 60%),
    radial-gradient(1px 1px at 30% 82%, rgba(220,240,255,.6), transparent 60%),
    radial-gradient(2px 2px at 88% 58%, rgba(220,240,255,.75), transparent 60%),
    radial-gradient(1px 1px at 45% 40%, rgba(220,240,255,.55), transparent 60%),
    radial-gradient(60% 50% at 15% -10%, rgba(139,124,246,.16), transparent 65%),
    radial-gradient(55% 45% at 95% 105%, rgba(103,232,249,.12), transparent 60%),
    #060913;
  color:#e7eefa;font-family:"Segoe UI",system-ui,sans-serif;padding:24px;
}
.wrap{max-width:520px}
.code{
  font-family:"SFMono-Regular",Consolas,monospace;font-size:clamp(4.5rem,16vw,8rem);
  font-weight:700;letter-spacing:.04em;color:var(--ion);line-height:1;
  text-shadow:0 0 40px rgba(103,232,249,.45);
}
h1{font-size:clamp(1.2rem,4vw,1.6rem);letter-spacing:.02em;margin:18px 0 12px}
p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:30px}
.mono{font-family:"SFMono-Regular",Consolas,monospace;font-size:11px;letter-spacing:.22em;color:var(--amber);text-transform:uppercase;display:block;margin-bottom:22px}
a{
  display:inline-block;font-family:"SFMono-Regular",Consolas,monospace;font-size:12px;
  letter-spacing:.16em;text-transform:uppercase;text-decoration:none;font-weight:600;
  color:#060913;background:var(--ion);padding:14px 26px;border-radius:9px;
  box-shadow:0 0 24px rgba(103,232,249,.3);transition:.25s;
}
a:hover{background:#8ff0ff;transform:translateY(-2px)}
.drift{display:inline-block;animation:drift 5s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translate(0,0) rotate(-8deg)}50%{transform:translate(10px,-14px) rotate(8deg)}}
@media (prefers-reduced-motion:reduce){.drift{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <span class="mono">// Signal lost · coordinates unknown</span>
  <div class="code">4<span class="drift">🛰️</span>4</div>
  <h1>You've drifted outside charted territory</h1>
  <p>This page doesn't exist — or it was jettisoned in a previous deployment. Either way, mission control can bring you home.</p>
  <a href="/">◈ Return to mission control</a>
</div>
</body>
</html>
